name: control_asistencias
description: "Control de asistencias - Proyecto B Móvil GAMA"
publish_to: 'none'

# Versión inicial. Ajustar conforme al apartado de versionado del MPF.
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Gestión de estado (MVVM) — apartado 4.3 del MPF
  provider: ^6.1.2

  # Cliente HTTP — apartado 5.2 del MPF
  dio: ^5.7.0

  # Persistencia local — apartado 6 del MPF
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Almacenamiento seguro de credenciales — apartado 7.2 del MPF
  flutter_secure_storage: ^9.2.2

  # Variables de entorno — apartado 7.1 del MPF
  flutter_dotenv: ^5.2.1

  # Tipografía — apartado 4.2 del MPF
  google_fonts: ^6.2.1

  # Iconografía — apartado 4.2 del MPF
  font_awesome_flutter: ^10.7.0

  # Lectura de QR (matriculación de alumnos) — RF-07
  mobile_scanner: ^5.2.3

  # Generación de QR temporal por el docente — RF-07
  qr_flutter: ^4.1.0

  # Detección de conectividad — RF-13
  connectivity_plus: ^6.0.5

  # Localización (debe coincidir con la versión que fija flutter_localizations)
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - .env

# Nota: Los logos institucionales deben colocarse en assets/images/.
# Ver assets/images/README.md para los nombres exactos esperados.
